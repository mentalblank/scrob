services:
  scrob-db:
    container_name: scrob-db
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: scrob
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: scrob
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scrob -d scrob"]
      interval: 5s
      timeout: 5s
      retries: 10

  scrob:
    container_name: scrob
    image: bellamy/scrob:latest
    restart: unless-stopped
    depends_on:
      scrob-db:
        condition: service_healthy
    ports:
      - "7330:7330"
    environment:
      # ── Database ────────────────────────────────────────────────────────────
      DATABASE_URL: postgresql+asyncpg://scrob:changeme@scrob-db:5432/scrob

      # ── Security ────────────────────────────────────────────────────────────
      # Generate with: openssl rand -hex 32
      SECRET_KEY: changeme

      # ── Registrations ────────────────────────────────────────────────────────
      # Registrations are open by default. Disable after initial setup if desired.
      # ENABLE_REGISTRATIONS: "false"
      # REGISTRATION_MAX_ALLOWED_USERS: "0"  # 0 = unlimited

      # ── OIDC (optional) ─────────────────────────────────────────────────────
      # OIDC_ENABLED: "false"
      # OIDC_PROVIDER_NAME: SSO
      # OIDC_CLIENT_ID: ""
      # OIDC_CLIENT_SECRET: ""
      # OIDC_AUTH_URL: ""
      # OIDC_TOKEN_URL: ""
      # OIDC_USERINFO_URL: ""
      # OIDC_REDIRECT_URL: http://your-server:7330/oidc-callback
      # OIDC_LOGOUT_URL: ""
      # OIDC_SCOPES: "openid email profile"
      # OIDC_IDENTIFIER_FIELD: email
      # OIDC_AUTO_CREATE_USERS: "true"
      # OIDC_DISABLE_PASSWORD_LOGIN: "false"

      # ── User & timezone ──────────────────────────────────────────────────────
      # Run the process as a specific user/group (defaults to 1000:1000)
      # PUID: "1000"
      # PGID: "1000"
      TZ: UTC

      # ── Advanced ─────────────────────────────────────────────────────────────
      # Override the internal backend port (only needed if 7331 conflicts on bare metal installations)
      # BACKEND_PORT: "7331"
    volumes:
      - scrob_data:/app/backend/data

volumes:
  db_data:
  scrob_data:
