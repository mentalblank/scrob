name: Dev Build

on:
  push:
    branches:
      - 'dev'
  workflow_dispatch:

jobs:
  docker:
    name: Build & push dev images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            APP_VERSION=dev
            APP_BRANCH=dev
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/scrob:dev
            ghcr.io/${{ github.repository_owner }}/scrob:dev
          cache-from: type=gha,scope=scrob-dev
          cache-to: type=gha,mode=max,scope=scrob-dev
