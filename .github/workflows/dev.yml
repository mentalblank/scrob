name: Dev Build

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  docker:
    name: Build & push dev images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            APP_VERSION=${{ github.ref_name }}
            APP_BRANCH=${{ github.ref_name }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/scrob:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/scrob:${{ github.ref_name }}
          cache-from: type=gha,scope=scrob-${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=scrob-${{ github.ref_name }}

      - name: Build and push omnibus
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.omnibus
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            APP_VERSION=${{ github.ref_name }}
            APP_BRANCH=${{ github.ref_name }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/scrob:${{ github.ref_name }}-omnibus
            ghcr.io/${{ github.repository_owner }}/scrob:${{ github.ref_name }}-omnibus
          cache-from: type=gha,scope=scrob-omnibus-${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=scrob-omnibus-${{ github.ref_name }}

  cleanup:
    name: Cleanup
    runs-on: ubuntu-latest
    if: always()
    permissions:
      actions: write
    steps:
      - name: Delete old/failed runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          for status in failure cancelled; do
            gh run list --status "$status" --limit 100 --json databaseId -q '.[].databaseId' | xargs -I{} gh run delete {} || true
          done
          gh run list --created "<$(date -d '7 days ago' +%Y-%m-%d)" --limit 100 --json databaseId -q '.[].databaseId' | xargs -I{} gh run delete {} || true
