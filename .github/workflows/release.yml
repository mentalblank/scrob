name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build Changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v5
        with:
          mode: 'COMMIT'
          configurationJson: |
            {
              "categories": [
                {
                  "title": "## Features",
                  "rules": [
                    {
                      "pattern": "^feat(\\([a-z0-9_-]+\\))?:",
                      "on_property": "title"
                    }
                  ]
                },
                {
                  "title": "## Bug Fixes",
                  "rules": [
                    {
                      "pattern": "^fix(\\([a-z0-9_-]+\\))?:",
                      "on_property": "title"
                    }
                  ]
                },
                {
                  "title": "## Refactoring & Maintenance",
                  "rules": [
                    {
                      "pattern": "^(refactor|chore|style)(\\([a-z0-9_-]+\\))?:",
                      "on_property": "title"
                    }
                  ]
                },
                {
                  "title": "## Documentation",
                  "rules": [
                    {
                      "pattern": "^docs(\\([a-z0-9_-]+\\))?:",
                      "on_property": "title"
                    }
                  ]
                },
                {
                  "title": "## Performance Improvements",
                  "rules": [
                    {
                      "pattern": "^perf(\\([a-z0-9_-]+\\))?:",
                      "on_property": "title"
                    }
                  ]
                },
                {
                  "title": "## Tests",
                  "rules": [
                    {
                      "pattern": "^test(\\([a-z0-9_-]+\\))?:",
                      "on_property": "title"
                    }
                  ]
                },
                {
                  "title": "## CI/CD & Build",
                  "rules": [
                    {
                      "pattern": "^(ci|build)(\\([a-z0-9_-]+\\))?:",
                      "on_property": "title"
                    }
                  ]
                }
              ],
              "template": "${{ '{{' }}CHANGELOG${{ '}}' }}",
              "empty_template": "No conventional changes found."
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.changelog }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Build & push release images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            APP_VERSION=${{ github.ref_name }}
            APP_BRANCH=main
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/scrob:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/scrob:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/scrob:latest
            ghcr.io/${{ github.repository_owner }}/scrob:${{ github.ref_name }}
          cache-from: type=gha,scope=scrob-release
          cache-to: type=gha,mode=max,scope=scrob-release

      - name: Build and push omnibus image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.omnibus
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            APP_VERSION=${{ github.ref_name }}
            APP_BRANCH=main
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/scrob:latest-omnibus
            ${{ secrets.DOCKERHUB_USERNAME }}/scrob:${{ github.ref_name }}-omnibus
            ghcr.io/${{ github.repository_owner }}/scrob:latest-omnibus
            ghcr.io/${{ github.repository_owner }}/scrob:${{ github.ref_name }}-omnibus
          cache-from: type=gha,scope=scrob-omnibus-release
          cache-to: type=gha,mode=max,scope=scrob-omnibus-release

  cleanup:
    name: Cleanup
    runs-on: ubuntu-latest
    if: always()
    permissions:
      actions: write
    steps:
      - name: Delete old/failed runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          for status in failure cancelled; do
            gh run list --status "$status" --limit 100 --json databaseId -q '.[].databaseId' | xargs -I{} gh run delete {} || true
          done
          gh run list --created "<$(date -d '7 days ago' +%Y-%m-%d)" --limit 100 --json databaseId -q '.[].databaseId' | xargs -I{} gh run delete {} || true
